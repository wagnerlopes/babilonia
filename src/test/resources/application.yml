server:
    port: 8080
    context-path: /babilonia/api

spring:
    datasource:
           url: jdbc:h2:mem:babilonia;INIT=CREATE SCHEMA IF NOT EXISTS babilonia;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
           username: sa
           password: 123
           driver-class-name: org.h2.Driver
           initial-size: 1

    jpa:
       show-sql: true
       defer-datasource-initialization: true
       hibernate:
           ddl-auto: create-drop
       properties:
           hibernate: 
               database-platform: org.hibernate.dialect.H2Dialect
               format_sql: true
