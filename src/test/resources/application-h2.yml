server:
    port: 8080
    context-path: /babilonia/api

spring:
    datasource:
           url: jdbc:h2:mem:babilonia;INIT=CREATE SCHEMA IF NOT EXISTS babilonia;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
           username: sa
           password: 123
           driver-class-name: org.h2.Driver
           initial-size: 1
    jpa:
      show-sql: true
      database-platform: H2
      hibernate:
          format_sql: true
          ddl-auto: create-drop
          
conectagov: 
  show-divergence: true
  ws:
    apolo: 
      url1: http://apolo.teste.com.br/v1/situacao.json
      url2: http://apolo.patch.com.br/v1/pesquisa.json
    mob: 
      url1: https://mob.teste.com.br/verificacao
